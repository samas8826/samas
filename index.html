    <script type="text/babel">
        // Register Handlebars helper for empty field handling
        Handlebars.registerHelper('field', function (fieldName) {
    return formData[fieldName] || CONFIG.fields[fieldName].placeholder;
});

Handlebars.registerHelper('terminalClerks', function () {

const terminal = (formData.terminal || "").toUpperCase();

if (terminal === "WWT") {
    return "CSC@NORTONLILLY.COM; WWTCLERKS@CSC-SC.COM";
}

if (terminal === "NCT") {
    return "CSC@NORTONLILLY.COM; NCTCLERKS@CSC-SC.COM";
}

if (terminal === "HLT") {
    return "CSC@NORTONLILLY.COM; HLTCLERKS@CSC-SC.COM";
}

return "CSC@NORTONLILLY.COM";
});
Handlebars.registerHelper('tugCompanyEmail', function () {

const tug = (formData.tugs || "").toLowerCase();

if (tug.includes("moran")) {
    return "DISPATCHER@CHARLESTONPILOTS.COM; CPSOPS@BELLSOUTH.NET; DCAUSEY1@BELLSOUTH.NET; CHARLESTONOPERATIONS@MORANTUG.COM";
}

if (tug.includes("mcallister")) {
    return "DISPATCHER@CHARLESTONPILOTS.COM; CPSOPS@BELLSOUTH.NET; DCAUSEY1@BELLSOUTH.NET; DISPATCHSC@MCALLISTERTOWING.COM";
}

return "DISPATCHER@CHARLESTONPILOTS.COM";
});
function App() {

const [formData, setFormData] = React.useState(
    Object.fromEntries(
        Object.keys(CONFIG.fields).map(key => [key, ''])
    )
);

const [quickFillText, setQuickFillText] = React.useState('');

const [templateToggles, setTemplateToggles] = React.useState(
    Object.fromEntries(CONFIG.templates.map(template => [template.id, true]))
);
    React.useEffect(() => {

const params = new URLSearchParams(window.location.search);
const quickFillData = params.get("qf");

if (!quickFillData) return;

const decoded = decodeURIComponent(quickFillData);

setQuickFillText(decoded);

const values = decoded.split("\t");

const fieldNames = Object.keys(CONFIG.fields);

const updatedData = fieldNames.reduce((acc, fieldName, index) => {

    let value = values[index] || '';

    // Normalize tug names so dropdown works
    if (fieldName === "tugs") {
        const lower = value.toLowerCase();
        if (lower.includes("moran")) value = "Moran";
        if (lower.includes("mcallister")) value = "McAllister";
    }

    acc[fieldName] = value;
    return acc;

}, {});

setFormData(updatedData);
window.formData = updatedData;

}, []);
	const handleToggleChange = (id) => {
    		setTemplateToggles(prev => ({
        		...prev,
        		[id]: !prev[id] // Toggle the value for the given template ID
    		}));
	};

            // Make formData available globally for the Handlebars helper
            window.formData = formData;

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                    const newData = {
                        ...prev,
                        [name]: value
                    };
                    window.formData = newData;
                    return newData;
                });
            };
	const handleTabDelimitedInput = (e) => {
    const input = e.target.value;
    const fieldNames = Object.keys(CONFIG.fields);
    const values = input.split("\t");

    const updatedData = fieldNames.reduce((acc, fieldName, index) => {

let value = values[index] || '';

// Normalize tug company names
if (fieldName === "tugs") {

    const lower = value.toLowerCase();

    if (lower.includes("moran")) {
        value = "Moran";
    }

    if (lower.includes("mcallister")) {
        value = "McAllister";
    }
}

acc[fieldName] = value;

return acc;

}, {});

    setFormData(updatedData);
    window.formData = updatedData; // Update global formData
};
            const handleReset = () => {
                setFormData(
                    Object.fromEntries(
                        Object.keys(CONFIG.fields).map(key => [key, ''])
                    )
                );
                setQuickFillText(''); // Clear QuickFill field
		window.formData = {}; // Reset global formData
            };

            // Compile templates once
            const compiledTemplates = React.useMemo(() => {
                return CONFIG.templates.map(template => {
                    const fullTemplate = template.template + CONFIG.signature;
                    return {
                        ...template,
                        compiledSubject: Handlebars.compile(template.subject),
                        compiledTemplate: Handlebars.compile(fullTemplate)
                    };
                });
            }, []);

            const createMailtoLink = (template) => {
                const subject = encodeURIComponent(template.compiledSubject());
                const body = encodeURIComponent(template.compiledTemplate());
                const to = Handlebars.compile(template.to)(formData);
                const cc = Handlebars.compile(template.cc)(formData);
                return `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;
            };

            const handleOpenAllEmails = () => {
    		compiledTemplates
        		.filter(template => templateToggles[template.id]) // Only include enabled templates
        		.forEach((template, index) => {
            			setTimeout(() => {
                			window.open(createMailtoLink(template), '_blank');
            			}, index * 800); // 800ms delay between each email
        		});
		};

            return (
                <div className="container mx-auto px-4 py-12 max-w-6xl">

        {/* QuickFill */}
        <div className="mb-8">
    <label className="block text-sm font-medium text-ocean-700 mb-2">
        QuickFill
    </label>

    <textarea
        value={quickFillText}
        onChange={(e) => {
            setQuickFillText(e.target.value);
            handleTabDelimitedInput(e);
        }}
        className="w-full px-4 py-2.5 border border-ocean-200 rounded-lg 
        focus:outline-none focus:ring-2 focus:ring-ocean-400 focus:border-ocean-400
        placeholder-gray-400 transition-colors duration-200"
        placeholder="Paste from Checklist"
        rows="3"
    />

</div>

        {/* Template Toggles + Buttons */}
        <div className="bg-white rounded-xl shadow-lg p-6 mb-10 border border-ocean-100">
            <h2 className="text-xl font-semibold text-ocean-800 mb-4">Select Email Templates</h2>

            {/* Select All */}
            <div className="flex items-center space-x-3 mb-4">
                <input
                    type="checkbox"
                    checked={Object.values(templateToggles).every(Boolean)}
                    onChange={(e) => {
                        const isChecked = e.target.checked;
                        setTemplateToggles(Object.fromEntries(
                            CONFIG.templates.map(template => [template.id, isChecked])
                        ));
                    }}
                />
                <label className="text-sm font-medium text-ocean-700">
                    Select All
                </label>
            </div>

            {/* Individual Template Toggles */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                {CONFIG.templates.map(template => (
                    <div key={template.id} className="flex items-center space-x-3">
                        <input
                            type="checkbox"
                            checked={templateToggles[template.id]}
                            onChange={() => handleToggleChange(template.id)}
                        />
                        <label className="text-sm font-medium text-ocean-700">
                            {template.name}
                        </label>
                    </div>
                ))}
            </div>

            {/* Buttons */}
            <div className="flex justify-between items-center">
                <button
                    onClick={handleOpenAllEmails}
                    className="bg-ocean-600 hover:bg-ocean-700 text-white px-6 py-2.5 rounded-lg
                             transition-colors duration-200 font-medium flex items-center gap-2"
                >
                    Open All Email Drafts
                </button>

                <button
                    onClick={handleReset}
                    className="bg-ocean-100 text-ocean-700 hover:bg-ocean-200 px-6 py-2.5 rounded-lg
                             transition-colors duration-200 font-medium"
                >
                    Reset Form
                </button>
            </div>
        </div>

        {/* Ship Details */}
        <div className="bg-white rounded-xl shadow-lg p-8 mb-10 border border-ocean-100">
            <h2 className="text-2xl font-semibold text-ocean-800 mb-6">Ship Details</h2>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
{Object.entries(CONFIG.fields).map(([fieldName, config]) => (
    <div key={fieldName}>
        <label className="block text-sm font-medium text-ocean-700 mb-2">
            {config.label}
        </label>

        {config.type === "select" ? (
            <select
                name={fieldName}
                value={formData[fieldName]}
                onChange={handleInputChange}
                className="w-full px-4 py-2.5 border border-ocean-200 rounded-lg 
                focus:outline-none focus:ring-2 focus:ring-ocean-400 focus:border-ocean-400"
            >
                <option value="">{config.placeholder}</option>
                {config.options.map(option => (
                    <option key={option} value={option}>{option}</option>
                ))}
            </select>
        ) : (
            <input
                type={config.type}
                name={fieldName}
                value={formData[fieldName]}
                onChange={handleInputChange}
                className="w-full px-4 py-2.5 border border-ocean-200 rounded-lg 
                focus:outline-none focus:ring-2 focus:ring-ocean-400 focus:border-ocean-400
                placeholder-gray-400 transition-colors duration-200"
                placeholder={config.placeholder}
            />
        )}

    </div>
))}
</div>
        </div>

        {/* Template Preview */}
        <h2 className="text-2xl font-semibold text-ocean-800 mb-6">Email Templates</h2>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            {compiledTemplates.map((template) => (
                <div key={template.id}
                    className="bg-white rounded-xl shadow-lg p-6 border border-ocean-100">

                    <div className="flex justify-between items-center mb-5">
                        <h3 className="text-xl font-semibold text-ocean-700">{template.name}</h3>

                        <a
                            href={createMailtoLink(template)}
                            className="bg-ocean-600 hover:bg-ocean-700 text-white px-5 py-2.5 rounded-lg
                            transition-colors duration-200 font-medium flex items-center gap-2"
                        >
                            Open in Email Client
                        </a>
                    </div>

                    <div className="space-y-4">

                        <div>
                            <div className="text-sm font-medium text-ocean-600 mb-1">To:</div>
                            <div className="text-gray-700 bg-ocean-50/50 p-3 rounded-lg">
                                {Handlebars.compile(template.to)(formData)}
                            </div>
                        </div>

                        <div>
                            <div className="text-sm font-medium text-ocean-600 mb-1">CC:</div>
                            <div className="text-gray-700 bg-ocean-50/50 p-3 rounded-lg">
                                {Handlebars.compile(template.cc)(formData)}
                            </div>
                        </div>

                        <div>
                            <div className="text-sm font-medium text-ocean-600 mb-1">Subject:</div>
                            <div className="text-gray-700 bg-ocean-50/50 p-3 rounded-lg">
                                {template.compiledSubject()}
                            </div>
                        </div>

                        <div>
                            <div className="text-sm font-medium text-ocean-600 mb-1">Body:</div>
                            <div className="whitespace-pre-wrap text-gray-700 bg-ocean-50/50 p-4 rounded-lg">
                                {template.compiledTemplate()}
                            </div>
                        </div>

                    </div>
                </div>
            ))}
        </div>

    </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
